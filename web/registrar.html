<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PQR.info Domain Registrar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body { background-color: #0b0c10; color: #c5c6c7; font-family: 'Courier New', Courier, monospace; }
        .card { background-color: #1f2833; border: 1px solid #66fcf1; }
        .btn-primary { background-color: #45a29e; border: none; }
        .btn-primary:hover { background-color: #66fcf1; color: #0b0c10; }
        .text-neon { color: #66fcf1; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand text-neon" href="/hud">« Back to HUD</a>
            <span class="navbar-text">PQR.info Web3 Registrar</span>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="text-center mb-4">
            <h1 class="text-neon">Domain Registrar Reseller</h1>
            <p>Powered by Cloudflare. Pay securely with SOL or PQR Coin.</p>
        </div>

        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card p-4">
                    <div class="input-group mb-3">
                        <input type="text" id="domain-search" class="form-control bg-dark text-light" placeholder="Search for your next domain (e.g., mysite.com)">
                        <button class="btn btn-primary" id="btn-search" type="button">Search</button>
                    </div>
                    
                    <div id="search-result" class="mt-4 d-none">
                        <!-- Filled by JS -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Checkout Modal -->
    <div class="modal fade" id="checkoutModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content bg-dark text-light border-info">
                <div class="modal-header border-info">
                    <h5 class="modal-title text-neon">Web3 Checkout</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p>Domain: <strong id="checkout-domain"></strong></p>
                    <p>Total: <strong id="checkout-price" class="text-neon"></strong></p>
                    
                    <div class="mb-3">
                        <label class="form-label">Select Crypto</label>
                        <select id="crypto-select" class="form-select bg-dark text-light">
                            <option value="SOL">Solana (SOL)</option>
                            <option value="PQR_COIN">PQR Private Coin</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Simulate Transaction Hash</label>
                        <input type="text" id="tx-hash" class="form-control bg-dark text-light" placeholder="Enter TxHash (e.g. 5xY...)">
                    </div>
                </div>
                <div class="modal-footer border-info">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="btn-purchase">Complete Purchase</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="registrar.js"></script>
</body>
</html>
